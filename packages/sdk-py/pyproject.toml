[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mailagent-sdk"
version = "0.0.1"
description = "Auto-generated Python client for the mailagent API."
requires-python = ">=3.11"
license = "MIT"
dependencies = ["httpx>=0.27.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/mailagent_sdk"]
